<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>만신: 령의 길</title>
  <desc>붉은 매듭이 달린 놋쇠 방울 안에 푸른 귀화가 피어오르는 픽셀 아이콘</desc>

  <!-- 먹빛 밤: 밝고 어두운 브라우저 탭 모두에서 같은 대비를 유지한다. -->
  <path fill="#120d1a" d="M4 0h24v2h2v3h2v22h-2v3h-3v2H5v-2H2v-3H0V5h2V2h2z"/>
  <path fill="#23132f" d="M6 2h20v2h3v4h2v16h-2v4h-4v2H7v-2H3v-4H1V8h2V4h3z"/>
  <path fill="#120d1a" d="M7 4h18v2h3v4h2v12h-2v4h-4v2H8v-2H4v-4H2V10h2V6h3z"/>

  <!-- 방울 고리 -->
  <path fill="#09070d" d="M10 1h8v1h3v2h1v5h-2v2h-5V8h3V6h1V4h-2V3h-5v1h-2v6H7V4h1V2h2z"/>
  <path fill="#8e5e2e" d="M11 2h7v1h2v2h1v3h-2v1h-2V8h2V5h-2V4h-5v1h-1v5H9V4h2z"/>
  <path fill="#d6a653" d="M12 2h5v1h2v1h-7zM10 4h2v5h-2z"/>
  <path fill="#f2d592" d="M12 3h4v1h-4zM10 4h1v3h-1z"/>

  <!-- 방울 외곽 -->
  <path fill="#09070d" d="M8 7h13v2h3v3h2v3h2v9h-2v3h-3v2h-4v2h-9v-2H7v-2H5v-3H4v-9h1v-3h2V9h1z"/>
  <path fill="#704622" d="M9 8h11v1h3v3h2v3h1v8h-2v3h-3v2h-3v2h-7v-2H8v-2H6v-3H5v-8h1v-3h2v-2h1z"/>

  <!-- 금빛 덮개 -->
  <path fill="#b97d37" d="M9 8h11v1h3v3h2v4H6v-3h2v-3h1z"/>
  <path fill="#d6a653" d="M10 9h9v1h3v2h2v3H7v-2h2v-3h1z"/>
  <path fill="#f2d592" d="M11 9h6v1h-6zM9 10h2v3H8v-2h1zM11 11h9v1h-9z"/>
  <path fill="#9a642d" d="M7 14h18v3H6v-2h1z"/>
  <path fill="#e2b55d" d="M7 14h17v1H7z"/>
  <path fill="#f8e7b0" d="M9 14h8v1H9z"/>

  <!-- 방울 안쪽의 밤 -->
  <path fill="#071018" d="M6 16h19v8h-2v3h-4v2h-8v-2H8v-3H6z"/>
  <path fill="#0b2030" d="M8 17h15v7h-2v2h-3v2h-6v-2H9v-3H8z"/>
  <path fill="#123b55" d="M9 18h13v6h-2v2h-9v-2H9z"/>

  <!-- 두꺼운 금빛 아랫테: 가운데 틈이 방울의 입을 만든다. -->
  <path fill="#09070d" d="M4 16h4v7h2v3h4v2h2v4h-6v-2H7v-2H5v-3H4zm21 0h3v9h-1v3h-2v2h-4v2h-5v-4h3v-2h3v-3h2v-7z"/>
  <path fill="#8e5e2e" d="M5 16h2v7h2v3h4v2h2v2h-4v-1H8v-2H6v-3H5zm20 0h1v8h-1v3h-2v2h-4v1h-2v-2h2v-1h3v-3h2v-8z"/>
  <path fill="#d6a653" d="M6 16h1v7h2v3h4v1H9v-1H7v-3H6zm18 0h1v8h-2v3h-4v1h-2v-1h2v-1h3v-3h2z"/>
  <path fill="#f2d592" d="M6 17h1v5H6zM8 24h1v2H8zM23 17h1v6h-1z"/>

  <!-- 귀화: 외곽·몸·심지를 세 단계로 단순화했다. -->
  <path fill="#092f4d" d="M16 15h3v5h2v2h1v4h-2v3h-2v2h-8v-2H8v-5h1v-3h2v-2h3v-2h2z"/>
  <path fill="#2b91c5" d="M16 16h2v5h2v2h1v3h-2v2h-2v2h-6v-2H9v-4h1v-2h2v-2h3v-2h1z"/>
  <path fill="#67d7f2" d="M16 18h1v4h2v2h1v2h-2v2h-2v1h-4v-2h-1v-3h2v-2h2v-2h1z"/>
  <path fill="#e9fbff" d="M14 23h2v2h2v2h-2v2h-3v-1h-1v-3h1v-1h1z"/>
  <path fill="#67d7f2" d="M9 19h1v1H9zM21 19h1v2h-1z"/>

  <!-- 붉은 매듭: 네 개의 고리와 글자 없는 부적 한 장만 남긴다. -->
  <g fill="#09070d">
    <path d="M21 3h7v1h1v5h-2v1h3v1h1v6h-2v1h-5v-2h-1v2h-6v-1h-1v-6h2V9h-2V6h1V5h4z"/>
    <path d="M24 15h6v8h-1v2h-5z"/>
  </g>
  <path fill="#8f2028" d="M22 4h5v1h1v3h-3V6h-2v3h-5V7h1V6h3zm3 5h4v2h1v5h-4v-3h-2v4h-5v-1h-2v-4h2v2h3v-4h3zm0 7h4v7h-4z"/>
  <path fill="#d33b3f" d="M23 4h3v1h-3zM19 6h3v1h-3zM26 10h3v1h-3zM19 12h2v2h-2zM25 17h3v1h-3z"/>
  <path fill="#5f161e" d="M26 19h2v1h-2zM26 21h2v1h-2z"/>
</svg>
